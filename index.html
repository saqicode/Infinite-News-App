<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Infinite News App</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --nav-bg: #0f172a;
      --nav-accent: #38bdf8;
      --nav-text: #f1f5f9;
      --nav-sub: #94a3b8;
      --bg: #f1f5f9;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --tag-bg: #e0f2fe;
      --tag-text: #0369a1;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(15,23,42,0.08);
      --shadow-hover: 0 8px 28px rgba(15,23,42,0.15);
    }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ───── NAVBAR ───── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--nav-bg);
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }

    .nav-inner {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 20px;
      height: 62px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-logo .logo-icon {
      width: 34px;
      height: 34px;
      background: var(--nav-accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .nav-logo span {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--nav-text);
      letter-spacing: -0.3px;
    }

    .nav-logo span em {
      color: var(--nav-accent);
      font-style: normal;
    }

    /* Search bar in navbar */
    .nav-search {
      flex: 1;
      max-width: 480px;
      margin-left: auto;
      display: flex;
      align-items: center;
      background: #1e293b;
      border: 1.5px solid #334155;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .nav-search:focus-within {
      border-color: var(--nav-accent);
    }

    .nav-search input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 9px 14px;
      color: var(--nav-text);
      font-size: 0.9rem;
      font-family: inherit;
    }

    .nav-search input::placeholder {
      color: var(--nav-sub);
    }

    .nav-search button {
      background: transparent;
      border: none;
      border-left: 1.5px solid #334155;
      padding: 8px 12px;
      cursor: pointer;
      color: var(--nav-accent);
      display: flex;
      align-items: center;
      transition: background 0.2s;
    }

    .nav-search button:hover {
      background: #0f172a;
    }

    .nav-search button .material-icons {
      font-size: 20px;
    }

    /* Live badge */
    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 20px;
      padding: 4px 10px;
      color: #f87171;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    /* ───── CONTENT AREA ───── */
    .page-wrap {
      max-width: 1300px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--card-border);
    }

    /* ───── NEWS GRID ───── */
    #news {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 560px) {
      #news { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 900px) {
      #news { grid-template-columns: repeat(3, 1fr); }
    }

    @media (min-width: 1200px) {
      #news { grid-template-columns: repeat(4, 1fr); }
    }

    /* ───── CARD ───── */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .card-img-wrap {
      position: relative;
      height: 190px;
      overflow: hidden;
      background: #e2e8f0;
      flex-shrink: 0;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.35s ease;
    }

    .card:hover .card-img-wrap img {
      transform: scale(1.04);
    }

    .card-tag {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .card-body {
      padding: 15px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-body h3 {
      font-size: 0.93rem;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text-primary);
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-body p {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .card-footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-source {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--nav-accent);
      background: #f0f9ff;
      padding: 3px 8px;
      border-radius: 6px;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-date {
      font-size: 0.7rem;
      color: #94a3b8;
    }

    /* ───── LOADER ───── */
    .loader-wrap {
      text-align: center;
      padding: 36px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--nav-accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-wrap p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* ───── EMPTY STATE ───── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
    }

    .empty-state .material-icons {
      font-size: 48px;
      color: #cbd5e1;
      margin-bottom: 12px;
      display: block;
    }

    .empty-state p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    /* Mobile: hide live badge text */
    @media (max-width: 400px) {
      .live-badge span { display: none; }
      .nav-logo span { font-size: 0.95rem; }
    }
  </style>
</head>

<body>

  <!-- ── NAVBAR ── -->
  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="#">
        <div class="logo-icon">🚀</div>
        <span>Infinite<em>News</em></span>
      </a>

      <div class="nav-search">
        <input type="text" id="search" placeholder="Search space news..." autocomplete="off">
        <button onclick="startSearch()" title="Search">
          <span class="material-icons">search</span>
        </button>
      </div>

      <div class="live-badge">
        <div class="live-dot"></div>
        <span>LIVE</span>
      </div>
    </div>
  </nav>

  <!-- ── MAIN CONTENT ── -->
  <div class="page-wrap">
    <p class="section-title">Latest Articles</p>
    <div id="news"></div>
  </div>

  <div class="loader-wrap" id="loader">
    <div class="spinner"></div>
    <p>Loading articles…</p>
  </div>

  <script>
    let offset = 0;
    const limit = 20;
    let loading = false;
    let searchQuery = "";
    let noMore = false;

    function formatDate(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }

    async function loadNews() {
      if (loading || noMore) return;
      loading = true;

      document.getElementById("loader").style.display = "flex";

      try {
        const q = searchQuery ? `&search=${encodeURIComponent(searchQuery)}` : "";
        const url = `https://api.spaceflightnewsapi.net/v4/articles/?limit=${limit}&offset=${offset}${q}`;
        const res = await fetch(url);
        const data = await res.json();
        const articles = data.results || [];

        const newsDiv = document.getElementById("news");

        if (offset === 0 && articles.length === 0) {
          newsDiv.innerHTML = `
            <div class="empty-state">
              <span class="material-icons">search_off</span>
              <p>No articles found for "<strong>${searchQuery}</strong>"</p>
            </div>`;
          document.getElementById("loader").style.display = "none";
          loading = false;
          return;
        }

        articles.forEach(article => {
          const img = article.image_url || "https://images.unsplash.com/photo-1446776877081-d282a0f896e2?w=600&q=80";
          const source = article.news_site || "Space News";
          const date = formatDate(article.published_at);

          const card = document.createElement("div");
          card.className = "card";
          card.onclick = () => window.open(article.url, "_blank");
          card.innerHTML = `
            <div class="card-img-wrap">
              <img src="${img}" alt="" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1446776877081-d282a0f896e2?w=600&q=80'">
              <span class="card-tag">Space</span>
            </div>
            <div class="card-body">
              <h3>${article.title}</h3>
              <p>${article.summary || "Read more about this article on the source website."}</p>
              <div class="card-footer">
                <span class="card-source">${source}</span>
                <span class="card-date">${date}</span>
              </div>
            </div>
          `;
          newsDiv.appendChild(card);
        });

        offset += limit;
        if (!data.next) noMore = true;

      } catch (err) {
        console.error(err);
      }

      document.getElementById("loader").style.display = "none";
      loading = false;
    }

    window.addEventListener("scroll", () => {
      if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
        loadNews();
      }
    });

    function startSearch() {
      searchQuery = document.getElementById("search").value.trim();
      document.getElementById("news").innerHTML = "";
      offset = 0;
      noMore = false;
      loadNews();
    }

    document.getElementById("search").addEventListener("keydown", e => {
      if (e.key === "Enter") startSearch();
    });

    loadNews();
  </script>

</body>
</html>
